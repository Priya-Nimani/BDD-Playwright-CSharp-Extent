name: Playwright Reqnroll Tests (ExtentReports for Multi-Env)

on:
  push:
    branches: [ "master","main"]
  pull_request:
    branches: [ "master", "main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [staging]

    env:
      TEST_ENV: ${{ matrix.env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet add package Microsoft.Playwright.NUnit

      - name: Build
        run: dotnet build 

      - name: Install Playwright Browsers
        run: pwsh bin/Debug/net10.0/playwright.ps1 install --with-deps
        shell: pwsh

      - name: Run Playwright + Reqnroll Tests
        run: $env:HEADED="0" |
             dotnet test --filter "Category=E2E" 

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ matrix.env }}
          path: TestResults/ExtentReports/*.html
                TestResults/trace/*.zip 
                TestResults/videos/*.webm
