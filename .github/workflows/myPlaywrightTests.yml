name: Playwright Reqnroll Tests (ExtentReports Multi-Env)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env: [dev, staging, production]

    env:
      TEST_ENV: ${{ matrix.env }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install Playwright Browsers
        run: pwsh -Command "npx playwright install --with-deps"
        shell: pwsh

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run Playwright + Reqnroll Tests
        run: dotnet test --configuration Release --no-build

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ matrix.env }}
          path: TestResults/ExtentReports/*.html
